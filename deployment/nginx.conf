# Configuration Nginx pour Hyper-Gadgets
# Fichier: /etc/nginx/sites-available/hyper-gadgets

# Redirection HTTP vers HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hyper-gadgets.cd www.hyper-gadgets.cd;
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Serveur HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hyper-gadgets.cd www.hyper-gadgets.cd;

    # Certificats SSL (gérés par Certbot)
    ssl_certificate /etc/letsencrypt/live/hyper-gadgets.cd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hyper-gadgets.cd/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compression Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Racine du frontend (fichiers statiques React)
    root /var/www/hyper-gadgets/frontend/build;
    index index.html;

    # Frontend - Fichiers statiques avec cache long
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API Backend - Proxy vers FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        
        # CORS headers (si nécessaire)
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";
    }

    # Webhook Stripe (bypass CORS)
    location /api/webhook/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router - Toutes les autres routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fichiers de santé
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Bloquer les fichiers sensibles
    location ~ /\. {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/hyper-gadgets.access.log;
    error_log /var/log/nginx/hyper-gadgets.error.log;
}
